name: JDCloud-ImmortalWrt

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: "0 18 * * *"

env:
  REPO_URL: https://github.com/ABCU/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/JDCloud.config
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  CLASH_KERNEL: amd64
  FIRMWARE_TAG: JDCloud
  TZ: Asia/Shanghai

jobs:
  # ============================================================
  # Job 1: 环境初始化 (~2min，失败只重跑此job)
  # ============================================================
  Init:
    runs-on: ubuntu-24.04

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@main

  # ============================================================
  # Job 2: 源码+feeds+DIY配置 (~8-15min，失败只重跑此job)
  # ============================================================
  Source:
    needs: Init
    runs-on: ubuntu-24.04
    outputs:
      HASH: ${{ steps.gen-vars.outputs.HASH }}
      DEVICE_TARGET: ${{ steps.gen-vars.outputs.DEVICE_TARGET }}
      DEVICE_SUBTARGET: ${{ steps.gen-vars.outputs.DEVICE_SUBTARGET }}
      SOURCE_REPO: ${{ steps.gen-vars.outputs.SOURCE_REPO }}
      VERSION_INFO: ${{ steps.gen-vars.outputs.VERSION_INFO }}
      VERSION_KERNEL: ${{ steps.gen-vars.outputs.VERSION_KERNEL }}

    steps:
    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt

    - name: Generate Variables(生成变量)
      id: gen-vars
      run: |
        cd /mnt/openwrt
        cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_OUTPUT
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_OUTPUT
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_OUTPUT
        HASH=$(git log -1 --pretty=format:'%h')
        echo "HASH=$HASH" >> $GITHUB_OUTPUT
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_OUTPUT
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_OUTPUT

    - name: Install Feeds(安装feeds)
      run: |
        cd /mnt/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration(加载自定义配置)
      run: |
        chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
        sed -i -e 's#^git_sparse_clone frp-binary #git_sparse_clone frp-binary-toml #g' \
            -e 's#^git_sparse_clone frp #git_sparse_clone frp-toml #g' "$GITHUB_WORKSPACE/$DIY_SCRIPT"
        cd /mnt/openwrt
        $GITHUB_WORKSPACE/$DIY_SCRIPT

  # ============================================================
  # Job 3: 下载DL包 (~10-20min + ~2min clone，失败只重跑此job)
  # ============================================================
  Download:
    needs: Source
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt

    - name: Load Custom Configuration(加载自定义配置)
      run: |
        chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
        sed -i -e 's#^git_sparse_clone frp-binary #git_sparse_clone frp-binary-toml #g' \
            -e 's#^git_sparse_clone frp #git_sparse_clone frp-toml #g' "$GITHUB_WORKSPACE/$DIY_SCRIPT"
        cd /mnt/openwrt
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    - name: Download DL Package(下载DL软件包)
      run: |
        cat $GITHUB_WORKSPACE/$CONFIG_FILE $GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE > /mnt/openwrt/.config
        cd /mnt/openwrt
        make defconfig
        make download -j$(nproc)

    - name: Cache DL Directory(缓存DL目录)
      uses: actions/cache@main
      with:
        key: dl-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-${{ needs.Source.outputs.HASH }}
        restore-keys: |
          dl-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-
          dl-${{ env.REPO_BRANCH }}-
        path: /mnt/openwrt/dl/

  # ============================================================
  # Job 4: 编译前 — 缓存预热/验证 (~2min clone + 恢复缓存)
  #       失败只重跑此job，不会浪费编译时间
  # ============================================================
  PreCompile:
    needs: Download
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt

    - name: Load Custom Configuration(加载自定义配置)
      run: |
        chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
        sed -i -e 's#^git_sparse_clone frp-binary #git_sparse_clone frp-binary-toml #g' \
            -e 's#^git_sparse_clone frp #git_sparse_clone frp-toml #g' "$GITHUB_WORKSPACE/$DIY_SCRIPT"
        cd /mnt/openwrt
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    - name: Restore DL Cache(恢复DL缓存)
      uses: actions/cache@main
      with:
        key: dl-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-${{ needs.Source.outputs.HASH }}
        restore-keys: |
          dl-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-
          dl-${{ env.REPO_BRANCH }}-
        path: /mnt/openwrt/dl/

    - name: Set Cache Date(设置缓存时间戳)
      run: echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    - name: Restore Toolchain Cache(恢复工具链缓存)
      id: toolchain-cache
      uses: actions/cache@main
      with:
        key: ${{ needs.Source.outputs.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-${{ needs.Source.outputs.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: |
          ${{ needs.Source.outputs.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-
        path: |
          /mnt/openwrt/.ccache
          /mnt/openwrt/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "/mnt/openwrt/staging_dir" ]; then
          find "/mnt/openwrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

  # ============================================================
  # Job 5: 编译 (~2min clone + 恢复缓存 + 1-5h编译，失败只重跑编译)
  # ============================================================
  Compile:
    needs: PreCompile
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt

    - name: Load Custom Configuration(加载自定义配置)
      run: |
        chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
        sed -i -e 's#^git_sparse_clone frp-binary #git_sparse_clone frp-binary-toml #g' \
            -e 's#^git_sparse_clone frp #git_sparse_clone frp-toml #g' "$GITHUB_WORKSPACE/$DIY_SCRIPT"
        cd /mnt/openwrt
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    - name: Restore DL Cache(恢复DL缓存)
      uses: actions/cache@main
      with:
        key: dl-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-${{ needs.Source.outputs.HASH }}
        restore-keys: |
          dl-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-
          dl-${{ env.REPO_BRANCH }}-
        path: /mnt/openwrt/dl/

    - name: Set Cache Date(设置缓存时间戳)
      run: echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    - name: Restore Toolchain Cache(恢复工具链缓存)
      uses: actions/cache@main
      with:
        key: ${{ needs.Source.outputs.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-${{ needs.Source.outputs.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: |
          ${{ needs.Source.outputs.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}-
        path: |
          /mnt/openwrt/.ccache
          /mnt/openwrt/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "/mnt/openwrt/staging_dir" ]; then
          find "/mnt/openwrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Setup Configuration(配置编译选项)
      run: |
        cat $GITHUB_WORKSPACE/$CONFIG_FILE $GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE > /mnt/openwrt/.config
        cd /mnt/openwrt
        make defconfig

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd /mnt/openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Prepare Artifacts(准备固件产物)
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p /tmp/firmware-artifacts
        cp -a /mnt/openwrt/.config /tmp/firmware-artifacts/
        DEVICE_TARGET=${{ needs.Source.outputs.DEVICE_TARGET }}
        DEVICE_SUBTARGET=${{ needs.Source.outputs.DEVICE_SUBTARGET }}
        cp -a /mnt/openwrt/bin/targets/$DEVICE_TARGET/$DEVICE_SUBTARGET /tmp/firmware-artifacts/target/
        mkdir -p /tmp/firmware-artifacts/packages
        find /mnt/openwrt/bin/packages -name "*.apk" -exec cp -a {} /tmp/firmware-artifacts/packages/ \;
        # Save metadata for PostCompile/Release job
        cat > /tmp/firmware-artifacts/meta.env <<META
        DATE="$(date +"%Y-%m-%d %H:%M:%S")"
        FILE_DATE="$(date +"%Y.%m.%d")"
        VERSION_INFO='${{ needs.Source.outputs.VERSION_INFO }}'
        VERSION_KERNEL=${{ needs.Source.outputs.VERSION_KERNEL }}
        META

    - name: Upload Artifacts(上传固件产物)
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ env.FIRMWARE_TAG }}
        path: /tmp/firmware-artifacts/
        retention-days: 3

  # ============================================================
  # Job 6: 编译后 — 整理文件+发布Release (~3min，与Cleanup并行)
  # ============================================================
  PostCompile:
    needs: Compile
    runs-on: ubuntu-24.04

    steps:
    - name: Download Artifacts(下载固件产物)
      uses: actions/download-artifact@v4
      with:
        name: firmware-${{ env.FIRMWARE_TAG }}
        path: /tmp/firmware

    - name: Organize Files(整理文件)
      run: |
        source /tmp/firmware/meta.env
        cd /tmp/firmware/target
        echo "=== 实际文件列表 ==="
        ls -la
        cp /tmp/firmware/.config Arthur.Athena.config
        mv -f config.buildinfo Arthur.Athena.config.buildinfo 2>/dev/null || echo "config.buildinfo not found"
        # 通配符匹配manifest（不同分支命名不同）
        manifest_file=$(ls *.manifest 2>/dev/null | head -1)
        if [ -n "$manifest_file" ]; then
          mv -f "$manifest_file" Arthur.Athena.manifest
        else
          echo "No manifest file found, skipping"
        fi
        # 处理软件包
        mkdir -p packages
        if [ -d /tmp/firmware/packages ]; then
          cp -a /tmp/firmware/packages/* ./packages/ 2>/dev/null || true
        fi
        tar -zcf Arthur.Athena.Packages.tar.gz packages
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "DATE=$DATE" >> $GITHUB_ENV
        echo "FILE_DATE=$FILE_DATE" >> $GITHUB_ENV
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Upload Firmware To Release(发布固件)
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Aurora；该固件在ImmortalWrt的基础上，添加了额外的软件包cpufreq、ddns、upnp、wol、samba4、vlmcsd、aria2、autoreboot、uhttpd、frps、frpc、diskman、hd-idle、acme、openlist2、wireguard、watchcat、3cat、passwall、gecoosac，并添加了若干工具，具体详见JDCloud.config(NoWiFi.config)和General.config。
          - 💻 这是 ${{ env.FIRMWARE_TAG }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🌐 默认地址: **192.168.2.1**
          - 🔑 默认密码: none
          ### 🧊 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}

  # ============================================================
  # Job 7: 清理缓存 — 与PostCompile并行执行
  # ============================================================
  Cleanup:
    needs: Compile
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout(检出代码，需SOURCE_REPO等变量)
      uses: actions/checkout@main

    - name: Delete Old Cache(删除旧缓存)
      run: |
        gh cache list --key ${{ needs.Source.outputs.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ needs.Source.outputs.DEVICE_TARGET }}-${{ needs.Source.outputs.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        echo "========cache status========"
        echo "ccache: $(du -sh /mnt/openwrt/.ccache 2>/dev/null | cut -f 1)"
        echo "staging: $(du -sh /mnt/openwrt/staging_dir 2>/dev/null | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete Old Workflows(删除旧工作流)
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        retain_days: 2
        keep_minimum_runs: 0